[supervisor]
default_profile = "core"
poll_interval_seconds = 5
status_host = "127.0.0.1"
status_port = 4060
runtime_dir = "./runtime"

[memory_policy]
auto_start_soft_limit_gb = 88
hard_limit_gb = 96
min_free_percent_for_conditional_start = 8
max_swap_used_gb = 8
heavy_model_budget_threshold_gb = 30
max_auto_heavy_models = 2

[profiles]
core = ["litellm", "embed-m3", "qwen2.5-1.5b"]
large-hot = ["litellm", "embed-m3", "qwen2.5-1.5b", "qwen3.5-9b", "omnicoder-9b", "qwen3.5-27b"]
large-fallback = ["litellm", "embed-m3", "qwen2.5-1.5b", "huihui-27b"]
full = ["litellm", "embed-m3", "qwen2.5-1.5b", "qwen3.5-9b", "omnicoder-9b", "gemma-4-26b"]

[[services]]
name = "qwen3.5-27b"
kind = "llama.cpp"
command = ["./start_llama_model.sh", "qwen3.5-27b", "18085"]
cwd = "."
port = 18085
health_url = "http://127.0.0.1:18085/health"
startup_grace_seconds = 45
startup_timeout_seconds = 900
restart_backoff_seconds = 20
unhealthy_threshold = 3
stop_timeout_seconds = 30
memory_budget_gb = 40
on_demand = true
pinned = false
heavy_group = "heavy-30g"
watch_files = ["./start_llama_model.sh", "./.env"]

